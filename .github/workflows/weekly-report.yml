name: Weekly Benchmark Report

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on:
      - self-hosted
      - windows

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Update vendor submodules to latest remote commits
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --remote

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark and refresh reports
        env:
          RIME_DLL: ${{ github.workspace }}\lib\rime.dll
        run: ./scripts/run_test.ps1

      - name: Commit and push report updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            Update weekly benchmark report and vendor snapshots

            Generated by the scheduled GitHub Actions workflow after refreshing vendor submodules.
          file_pattern: |
            report/*.md
            vendor/rime-frost
            vendor/rime-ice
            vendor/rime_wanxiang
